<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>군무원 최종점수 계산기</title>
  <style>
    :root{
      --bg:#0b0f14;
      --panel:#151b23;
      --panel2:#1d2632;
      --line:#334154;
      --text:#eef4fb;
      --muted:#a8b6c8;
      --accent:#ffbe55;
      --accent-strong:#ffd98a;
      --mint:#52d1b2;
      --danger:#ff6b6b;
      --final1:#fff3c9;
      --final2:#ffd36a;
      --final3:#ffb11b;
      --finalText:#2f1b00;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
      background:linear-gradient(180deg,#0b0f14,#141b25);
      color:var(--text);
    }
    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:20px;
    }
    h1{
      margin:0 0 8px;
      font-size:34px;
    }
    .desc{
      margin:0 0 20px;
      color:var(--muted);
      font-size:15px;
      line-height:1.6;
    }
    .grid{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:20px;
      align-items:start;
    }
    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.28);
    }
    .card h2{
      margin:0 0 14px;
      font-size:21px;
    }
    label{
      display:block;
      margin:12px 0 6px;
      font-weight:700;
    }
    select,input{
      width:100%;
      padding:12px 13px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--panel2);
      color:var(--text);
      font-size:15px;
      outline:none;
    }
    select:focus,input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(255,190,85,.15);
    }
    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .subject-box{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:10px;
    }
    .subject-chip{
      background:#10161d;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
    }
    .small{
      display:block;
      color:var(--muted);
      font-size:12px;
      margin-bottom:4px;
    }
    .btns{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }
    button{
      border:0;
      border-radius:12px;
      padding:13px 16px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
    }
    .primary{
      background:var(--accent);
      color:#2c1a00;
    }
    .secondary{
      background:#263243;
      color:var(--text);
      border:1px solid var(--line);
    }
    .result{
      display:grid;
      gap:12px;
    }
    .result-box{
      background:#10161d;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
    }
    .k{
      color:var(--muted);
      font-size:12px;
      margin-bottom:4px;
    }
    .v{
      font-size:24px;
      font-weight:800;
    }
    .ok{color:var(--mint);font-weight:700}
    .warn{color:var(--danger);font-weight:700}
    .note,.hint{
      color:var(--muted);
      font-size:14px;
      line-height:1.6;
    }
    .note a{
      color:var(--accent-strong);
      text-decoration:none;
      font-weight:700;
    }
    .note a:hover{
      text-decoration:underline;
    }
    .pill{
      display:inline-block;
      padding:4px 9px;
      border-radius:999px;
      background:#243041;
      color:#dbe8ff;
      font-size:12px;
      margin:2px 6px 2px 0;
      border:1px solid #35507b;
    }
    #certPreview{
      margin-top:10px;
      line-height:1.8;
      max-height:180px;
      overflow:auto;
      padding-right:4px;
    }
    .final-box{
      background:linear-gradient(135deg,var(--final1),var(--final2) 60%,var(--final3));
      color:var(--finalText);
      border:0;
      box-shadow:0 18px 40px rgba(255,190,85,.28), 0 0 0 2px rgba(255,235,180,.25) inset;
      padding:22px 18px;
      border-radius:18px;
      position:relative;
      overflow:hidden;
    }
    .final-box::after{
      content:"";
      position:absolute;
      top:-30px;
      right:-20px;
      width:120px;
      height:120px;
      background:rgba(255,255,255,.22);
      border-radius:50%;
      filter:blur(2px);
    }
    .final-box .k{
      color:#6f4b00;
      font-size:13px;
      font-weight:800;
      letter-spacing:.3px;
    }
    .final-box .v{
      font-size:46px;
      font-weight:900;
      line-height:1.05;
      margin-top:6px;
    }
    .final-sub{
      margin-top:8px;
      font-size:13px;
      color:#6f4b00;
      font-weight:700;
    }
    @media (max-width:960px){
      .grid,.row,.subject-box{grid-template-columns:1fr}
      .wrap{padding:14px}
      h1{font-size:28px}
      .final-box .v{font-size:38px}
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>군무원 최종점수 계산기</h1>
  <p class="desc">직렬 선택 → 실제 과목명 자동 변경 → 자격증 가산점 반영 → 면접점수 포함 최종점수 계산</p>

  <div class="grid">
    <section class="card">
      <h2>입력</h2>

      <label for="series">직렬 선택</label>
      <select id="series"></select>

      <div class="subject-box">
        <div class="subject-chip"><span class="small">과목 1</span><strong id="sub1Name">국어</strong></div>
        <div class="subject-chip"><span class="small">과목 2</span><strong id="sub2Name">전공1</strong></div>
        <div class="subject-chip"><span class="small">과목 3</span><strong id="sub3Name">전공2</strong></div>
      </div>

      <div class="row">
        <div>
          <label id="label1" for="score1">국어 점수</label>
          <input type="number" id="score1" min="0" max="100" step="0.01" placeholder="국어 점수 입력" />
        </div>
        <div>
          <label id="label2" for="score2">전공1 점수</label>
          <input type="number" id="score2" min="0" max="100" step="0.01" placeholder="전공1 점수 입력" />
        </div>
      </div>

      <div class="row">
        <div>
          <label id="label3" for="score3">전공2 점수</label>
          <input type="number" id="score3" min="0" max="100" step="0.01" placeholder="전공2 점수 입력" />
        </div>
        <div>
          <label for="interview">면접 점수 (25점 만점)</label>
          <input type="number" id="interview" min="0" max="25" step="0.01" placeholder="면접 점수 입력" />
        </div>
      </div>

      <div class="row">
        <div>
          <label for="certLevel">자격증 등급</label>
          <select id="certLevel"></select>
        </div>
        <div>
          <label for="certName">가산 자격증 선택</label>
          <select id="certName"></select>
        </div>
      </div>

      <p class="hint" id="certHint">선택한 직렬에 따라 해당 등급의 자격증 목록이 자동으로 바뀝니다.</p>
      <div id="certPreview"></div>

      <div class="btns">
        <button class="primary" onclick="calculate()">최종점수 계산</button>
        <button class="secondary" onclick="resetForm()">초기화</button>
      </div>
    </section>

    <section class="card">
      <h2>결과</h2>
      <div class="result">
        <div class="final-box">
          <div class="k">최종점수</div>
          <div class="v" id="finalTotal">-</div>
          <div class="final-sub">필기 반영점수 + 면접점수 합산</div>
        </div>

        <div class="result-box">
          <div class="k">원점수 필기 평균</div>
          <div class="v" id="rawAvg">-</div>
        </div>

        <div class="result-box">
          <div class="k">가산 반영 필기 평균</div>
          <div class="v" id="writtenAvg">-</div>
        </div>

        <div class="result-box">
          <div class="k">면접 점수</div>
          <div class="v" id="interviewView">-</div>
        </div>

        <div class="result-box">
          <div class="k">가산 비율</div>
          <div class="v" id="bonusRate">-</div>
        </div>

        <div class="result-box">
          <div class="k">판정</div>
          <div id="statusText">-</div>
        </div>

        <div class="result-box">
          <div class="k">선택 자격증</div>
          <div id="selectedCert">-</div>
        </div>

        <div class="result-box">
          <div class="k">상세 계산</div>
          <div id="detailText">-</div>
        </div>
      </div>

      <p class="note">
        <br>
        <a href="https://malrang45.github.io/mil/%EB%B6%80%EB%8C%80%EB%B6%84%EB%A5%98/" target="_blank" rel="noopener noreferrer">부대분류 사이트</a>
      </p>
    </section>
  </div>
</div>

    "기술사": ["표면처리","금속재료","차량"],
    "기능장": ["표면처리","금속재료","위험물","자동차정비"],
    "기사": ["금속재료","항공정비사","침투비파괴검사","화학분석","자동차정비"],
    "산업기사": ["표면처리","금속재료","위험물","자동차정비","침투비파괴검사"],
    "기능사": ["금속도장","금속재료시험","표면처리","열처리","위험물","화학분석","침투비파괴검사"]
  },
  "기상": {
    "기술사": ["컴퓨터시스템응용","정보통신"],
    "기능장": ["전자","통신설비"],
    "기사": ["전자","전자계산기","반도체설계","정보처리","전자계산기조직응용","정보통신","전파전자통신","무선설비","방송통신"],
    "산업기사": ["전자","전자계산기제어","정보처리","정보통신","전파전자통신","무선설비","반도체설계","방송통신"],
    "기능사": []
  },
  "기상예보": {
    "기술사": ["기상예보","지질및지반"],
    "기능장": [],
    "기사": ["기상","응용지질"],
    "산업기사": ["기상감정"],
    "기능사": []
  },
  "의공": {
    "기술사": ["전자응용"],
    "기능장": ["전자"],
    "기사": ["전자","의공"],
    "산업기사": ["전자","전자계산기제어","의공","의지보조기기사"],
    "기능사": []
  }
};

const bonusRateByLevel = {
  "없음": 0,
  "기술사": 5,
  "기능장": 5,
  "기사": 5,
  "산업기사": 5,
  "기능사": 3
};

const seriesSelect = document.getElementById('series');
const certLevel = document.getElementById('certLevel');
const certName = document.getElementById('certName');

Object.keys(subjectMap).forEach(k => {
  const o = document.createElement('option');
  o.value = k;
  o.textContent = k;
  seriesSelect.appendChild(o);
});

["없음","기술사","기능장","기사","산업기사","기능사"].forEach(k => {
  const o = document.createElement('option');
  o.value = k;
  o.textContent = k;
  certLevel.appendChild(o);
});

function updateSubjects() {
  const [a, b, c] = subjectMap[seriesSelect.value];
  document.getElementById('sub1Name').textContent = a;
  document.getElementById('sub2Name').textContent = b;
  document.getElementById('sub3Name').textContent = c;

  document.getElementById('label1').textContent = `${a} 점수`;
  document.getElementById('label2').textContent = `${b} 점수`;
  document.getElementById('label3').textContent = `${c} 점수`;

  document.getElementById('score1').placeholder = `${a} 점수 입력`;
  document.getElementById('score2').placeholder = `${b} 점수 입력`;
  document.getElementById('score3').placeholder = `${c} 점수 입력`;
}

function updateCertOptions() {
  const series = seriesSelect.value;
  const level = certLevel.value;
  certName.innerHTML = '';
  const preview = document.getElementById('certPreview');
  const hint = document.getElementById('certHint');

  if (!applicableSeries.includes(series)) {
    const opt = document.createElement('option');
    opt.value = '';
    opt.textContent = '가산 비적용 직렬';
    certName.appendChild(opt);
    certLevel.value = '없음';
    certLevel.disabled = true;
    certName.disabled = true;
    preview.innerHTML = '<span class="warn">이 직렬은 현재 설정상 가산 대상 직렬이 아닙니다.</span>';
    hint.textContent = '가산 비적용 직렬입니다.';
    return;
  }

  certLevel.disabled = false;
  certName.disabled = false;
  hint.textContent = '선택한 직렬에 따라 해당 등급의 자격증 목록이 자동으로 바뀝니다.';

  if (level === '없음') {
    const opt = document.createElement('option');
    opt.value = '';
    opt.textContent = '선택 안 함';
    certName.appendChild(opt);
    preview.innerHTML = '<span class="pill">가산점 미선택</span>';
    return;
  }

  const list = (certData[series] && certData[series][level]) ? certData[series][level] : [];

  if (!list.length) {
    const opt = document.createElement('option');
    opt.value = '';
    opt.textContent = '해당 등급 자격증 없음';
    certName.appendChild(opt);
    preview.innerHTML = '<span class="warn">이 직렬에는 해당 등급 자격증 데이터가 없습니다.</span>';
    return;
  }

  list.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    certName.appendChild(opt);
  });

  preview.innerHTML = list.slice(0, 12).map(v => `<span class="pill">${v}</span>`).join('');
  if (list.length > 12) {
    preview.innerHTML += `<div class="hint">외 ${list.length - 12}개 더 있음</div>`;
  }
}

function calculate() {
  const s1 = parseFloat(document.getElementById('score1').value);
  const s2 = parseFloat(document.getElementById('score2').value);
  const s3 = parseFloat(document.getElementById('score3').value);
  const interview = parseFloat(document.getElementById('interview').value);

  if ([s1, s2, s3].some(v => Number.isNaN(v) || v < 0 || v > 100)) {
    alert('필기 3과목 점수를 0~100 사이로 입력하세요.');
    return;
  }

  if (Number.isNaN(interview) || interview < 0 || interview > 25) {
    alert('면접 점수는 0~25 사이로 입력하세요.');
    return;
  }

  const rawAvg = (s1 + s2 + s3) / 3;
  const pass40 = s1 >= 40 && s2 >= 40 && s3 >= 40;
  const series = seriesSelect.value;
  const level = certLevel.value;
  const cert = certName.value;

  let rate = 0;
  if (applicableSeries.includes(series) && pass40 && level !== '없음' && cert) {
    rate = bonusRateByLevel[level] || 0;
  }

  const f1 = s1 + rate;
  const f2 = s2 + rate;
  const f3 = s3 + rate;
  const writtenAvg = (f1 + f2 + f3) / 3;
  const interviewPass = interview >= 15;
  const finalTotal = writtenAvg * 0.75 + interview;

  document.getElementById('rawAvg').textContent = rawAvg.toFixed(2) + '점';
  document.getElementById('writtenAvg').textContent = writtenAvg.toFixed(2) + '점';
  document.getElementById('interviewView').textContent = interview.toFixed(2) + '점';
  document.getElementById('finalTotal').textContent = finalTotal.toFixed(2) + '점';
  document.getElementById('bonusRate').textContent = rate ? rate + '%' : '0%';

  let status = '';
  if (!pass40) {
    status += '<div class="warn">필기 과락(40점 미만 과목 있음)으로 가산 미적용</div>';
  } else {
    status += '<div class="ok">필기 과락 없음</div>';
  }

  if (!interviewPass) {
    status += '<div class="warn">면접 15점 미만이면 최종 불합격 가능</div>';
  } else {
    status += '<div class="ok">면접 기준 충족</div>';
  }
  document.getElementById('statusText').innerHTML = status;

  document.getElementById('selectedCert').textContent = cert ? `${series} / ${level} / ${cert}` : '선택 없음';

  const [n1, n2, n3] = subjectMap[series];
  document.getElementById('detailText').innerHTML =
    `${n1}: ${s1.toFixed(2)} → ${f1.toFixed(2)}점<br>` +
    `${n2}: ${s2.toFixed(2)} → ${f2.toFixed(2)}점<br>` +
    `${n3}: ${s3.toFixed(2)} → ${f3.toFixed(2)}점<br>` +
    `필기 반영점수: ${writtenAvg.toFixed(2)} × 0.75 = ${(writtenAvg * 0.75).toFixed(2)}점<br>` +
    `최종점수: ${(writtenAvg * 0.75).toFixed(2)} + ${interview.toFixed(2)} = ${finalTotal.toFixed(2)}점`;
}

function resetForm() {
  seriesSelect.value = '전산';
  document.getElementById('score1').value = '';
  document.getElementById('score2').value = '';
  document.getElementById('score3').value = '';
  document.getElementById('interview').value = '';
  certLevel.value = '없음';

  updateSubjects();
  updateCertOptions();

  document.getElementById('rawAvg').textContent = '-';
  document.getElementById('writtenAvg').textContent = '-';
  document.getElementById('interviewView').textContent = '-';
  document.getElementById('finalTotal').textContent = '-';
  document.getElementById('bonusRate').textContent = '-';
  document.getElementById('statusText').textContent = '-';
  document.getElementById('selectedCert').textContent = '-';
  document.getElementById('detailText').textContent = '-';
}

seriesSelect.addEventListener('change', () => {
  updateSubjects();
  updateCertOptions();
});
certLevel.addEventListener('change', updateCertOptions);

seriesSelect.value = '전산';
certLevel.value = '없음';
updateSubjects();
updateCertOptions();
</script>
