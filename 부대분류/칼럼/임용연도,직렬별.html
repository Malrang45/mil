<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임용예정일별/직렬별 근무 지역 및 부대 조회</title>
    
    <!-- 💡 상위 폴더(../)에 있는 data.js 파일을 안전하게 불러옵니다. -->
    <script src="../data.js" defer></script>
    
    <style>
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #28a745;
            padding-bottom: 10px;
        }
        .section {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            background-color: #fafbfc;
        }
        .section-title {
            font-weight: bold;
            margin-bottom: 12px;
            color: #495057;
        }
        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            background: #fff;
            border: 1px solid #ced4da;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            font-size: 14px;
        }
        .radio-label:hover {
            border-color: #28a745;
            background-color: #f4fbf6;
        }
        .radio-label input {
            display: none;
        }
        .radio-label.year-active {
            border-color: #28a745;
            background-color: #28a745;
            color: #fff;
            font-weight: bold;
        }
        .radio-label.series-active {
            border-color: #0056b3;
            background-color: #0056b3;
            color: #fff;
            font-weight: bold;
        }
        #loading {
            color: #666;
            font-style: italic;
        }
        
        /* 테이블 동시 배치를 위한 레이아웃 스타일 */
        .tables-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-top: 15px;
        }
        .table-wrapper {
            flex: 1;
            background: #fff;
            padding: 15px;
            border: 1px solid #dee2e6;
            border-radius: 6px;
        }
        .table-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }
        th {
            background-color: #e9ecef;
            color: #495057;
        }
        .bar-container {
            width: 100%;
            background-color: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }
        .bar {
            height: 18px;
            text-align: right;
            padding-right: 5px;
            color: white;
            font-size: 11px;
            line-height: 18px;
            transition: width 0.3s;
        }
        .name-column {
            font-weight: bold;
            text-align: left;
            padding-left: 15px;
        }
        .notice-text {
            color: #adb5bd;
            text-align: center;
            padding: 30px 0;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>📅 임용예정일 / 직렬별 배정 통계 조회</h2>
        
        <div id="loading">데이터를 분석 중입니다... 잠시만 기다려주세요.</div>

        <!-- 1. 임용예정년도 선택 영역 -->
        <div class="section" id="year-section" style="display:none;">
            <div class="section-title">1. 임용예정년도 선택</div>
            <div id="year-group" class="radio-group"></div>
        </div>
        
        <!-- 2. 직렬 선택 영역 -->
        <div class="section" id="series-section" style="display:none;">
            <div class="section-title">2. 직렬 선택</div>
            <div id="series-group" class="radio-group"></div>
        </div>
        
        <!-- 3. 결과 동시 출력 영역 -->
        <div class="section">
            <div class="section-title">3. 배정 결과 통계 요약 <span id="selected-title" style="color:#28a745; margin-left:10px;"></span></div>
            
            <div id="main-result-wrapper">
                <p class="notice-text">위에서 임용예정년도와 직렬을 모두 선택하시면 상세 분석 데이터가 동시에 표시됩니다.</p>
            </div>
        </div>
    </div>

    <script>
        let localRawData = [];
        let selectedYear = "";
        let selectedSeries = "";

        // 연도 보정 함수
        function extractYear(dateStr) {
            if (!dateStr) return null;
            const cleanStr = dateStr.trim();
            const match4Digit = cleanStr.match(/^(\d{4})/);
            if (match4Digit) return match4Digit[1];
            
            const match2Digit = cleanStr.match(/^(\d{2})/);
            if (match2Digit) {
                const shortYear = match2Digit[1];
                return parseInt(shortYear) >= 0 ? "20" + shortYear : "19" + shortYear;
            }
            return null;
        }

        // 💡 DATA_STORAGE 변수를 안전하게 가져오는 데이터 로드 로직
        function loadData() {
            try {
                if (typeof DATA_STORAGE !== 'undefined') {
                    // 2차원 배열 구조 대응
                    localRawData = Array.isArray(DATA_STORAGE[0]) ? DATA_STORAGE[0] : DATA_STORAGE;
                    document.getElementById('loading').style.display = 'none';
                    initFilters();
                } else {
                    throw new Error("data.js를 찾지 못했거나 DATA_STORAGE 변수가 정의되지 않았습니다. 파일 경로 및 파일명을 다시 확인해 주세요.");
                }
            } catch (error) {
                document.getElementById('loading').innerText = "데이터 로드 실패: " + error.message;
                document.getElementById('loading').style.color = '#dc3545';
                document.getElementById('loading').style.fontWeight = 'bold';
            }
        }

        function initFilters() {
            const yearsSet = new Set();
            const seriesSet = new Set();

            localRawData.forEach(row => {
                const appointmentDate = row["임용예정일"];
                const series = row["직렬"] ? row["직렬"].trim() : "";

                const parsedYear = extractYear(appointmentDate);
                if (parsedYear) yearsSet.add(parsedYear);
                
                if (series && series !== "9급" && series !== "계급") seriesSet.add(series);
            });

            const sortedYears = Array.from(yearsSet).sort((a, b) => b - a);
            const sortedSeries = Array.from(seriesSet).sort();

            renderYearButtons(sortedYears);
            renderSeriesButtons(sortedSeries);

            document.getElementById('year-section').style.display = 'block';
            document.getElementById('series-section').style.display = 'block';
        }

        function renderYearButtons(years) {
            const container = document.getElementById('year-group');
            container.innerHTML = "";
            years.forEach(year => {
                const label = document.createElement('label');
                label.className = 'radio-label year-label';
                
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'year-choice';
                radio.value = year;
                
                radio.addEventListener('change', (e) => {
                    document.querySelectorAll('.year-label').forEach(l => l.classList.remove('year-active'));
                    label.classList.add('year-active');
                    selectedYear = e.target.value;
                    checkAndRender();
                });

                label.appendChild(radio);
                label.appendChild(document.createTextNode(year + "년 임용"));
                container.appendChild(label);
            });
        }

        function renderSeriesButtons(seriesList) {
            const container = document.getElementById('series-group');
            container.innerHTML = "";
            seriesList.forEach(series => {
                const label = document.createElement('label');
                label.className = 'radio-label series-label';
                
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'series-choice';
                radio.value = series;
                
                radio.addEventListener('change', (e) => {
                    document.querySelectorAll('.series-label').forEach(l => l.classList.remove('series-active'));
                    label.classList.add('series-active');
                    selectedSeries = e.target.value;
                    checkAndRender();
                });

                label.appendChild(radio);
                label.appendChild(document.createTextNode(series));
                container.appendChild(label);
            });
        }

        function checkAndRender() {
            if (!selectedYear || !selectedSeries) return; 

            document.getElementById('selected-title').innerText = `(${selectedYear}년 임용 - ${selectedSeries})`;

            const regionCounts = {};
            const unitCounts = {};
            let totalRegionCount = 0;
            let totalUnitCount = 0;

            localRawData.forEach(row => {
                const appointmentDate = row["임용예정일"];
                const rowSeries = row["직렬"] ? row["직렬"].trim() : "";
                const rowRegion = row["지역"] ? row["지역"].trim() : "";
                const rowUnit = row["부대"] ? row["부대"].trim() : "";

                const rowYear = extractYear(appointmentDate);

                if (rowYear === selectedYear && rowSeries === selectedSeries) {
                    if (rowRegion) {
                        if (!regionCounts[rowRegion]) regionCounts[rowRegion] = 0;
                        regionCounts[rowRegion] += 1;
                        totalRegionCount += 1;
                    }
                    if (rowUnit) {
                        if (!unitCounts[rowUnit]) unitCounts[rowUnit] = 0;
                        unitCounts[rowUnit] += 1;
                        totalUnitCount += 1;
                    }
                }
            });

            renderCombinedTables(regionCounts, totalRegionCount, unitCounts, totalUnitCount);
        }

        function renderCombinedTables(regionCounts, totalRegion, unitCounts, totalUnit) {
            const wrapper = document.getElementById('main-result-wrapper');
            
            if (totalRegion === 0 && totalUnit === 0) {
                wrapper.innerHTML = `<p class="notice-text" style="color:#dc3545;">선택하신 조건에 일치하는 데이터가 없습니다.</p>`;
                return;
            }

            let html = `<div class="tables-container">`;

            html += `
                <div class="table-wrapper">
                    <div class="table-title">📍 근무 지역별 배정 현황</div>
                    ${buildTableHTML(regionCounts, totalRegion, '근무 지역명', '#28a745')}
                </div>
            `;

            html += `
                <div class="table-wrapper">
                    <div class="table-title">🪖 근무 부대별 배정 현황</div>
                    ${buildTableHTML(unitCounts, totalUnit, '근무 부대명', '#007bff')}
                </div>
            `;

            html += `</div>`;
            wrapper.innerHTML = html;
        }

        function buildTableHTML(dataMap, totalCount, columnName, themeColor) {
            if (totalCount === 0) {
                return `<p style="color:#666; padding:10px; text-align:center;">배정 데이터가 없습니다.</p>`;
            }

            const sortedKeys = Object.keys(dataMap).sort((a, b) => dataMap[b] - dataMap[a]);
            const maxCount = Math.max(...Object.values(dataMap));

            let tableHtml = `
                <table>
                    <thead>
                        <tr>
                            <th style="width: 10%;">순위</th>
                            <th style="width: 30%;">${columnName}</th>
                            <th style="width: 20%;">배정 자리 수</th>
                            <th style="width: 15%;">비중 (%)</th>
                            <th style="width: 25%;">분포 그래프</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            sortedKeys.forEach((key, index) => {
                const count = dataMap[key];
                const percentage = ((count / totalCount) * 100).toFixed(1);
                const graphWidth = ((count / maxCount) * 100).toFixed(1);

                tableHtml += `
                    <tr>
                        <td>${index + 1}</td>
                        <td class="name-column">${key}</td>
                        <td><strong>${count.toLocaleString()} 자리</strong></td>
                        <td>${percentage}%</td>
                        <td>
                            <div class="bar-container">
                                <div class="bar" style="width: ${graphWidth}%; background-color: ${themeColor};">${percentage}%</div>
                            </div>
                        </td>
                    </tr>
                `;
            });

            tableHtml += `
                    </tbody>
                </table>
                <p style="text-align:right; color:#666; font-size:11px; margin-top:8px;">※ 총 합계: ${totalCount.toLocaleString()} 자리</p>
            `;

            return tableHtml;
        }

        // HTML 렌더링이 완료된 시점에 로드하도록 이벤트 바인딩 방식 교체
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
